<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign Up</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&family=Poppins:wght@400;600&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { min-height:100vh; display:flex; align-items:center; justify-content:center; background:#1e1e2e; font-family:'Poppins',sans-serif; overflow:hidden; }
    body::before, body::after { content:''; position:fixed; border-radius:50%; filter:blur(80px); opacity:.18; pointer-events:none; }
    body::before { width:400px; height:400px; background:#ff2d78; top:-100px; left:-100px; animation:blobMove1 8s infinite alternate ease-in-out; }
    body::after  { width:350px; height:350px; background:#00e5ff; bottom:-80px; right:-80px; animation:blobMove2 7s infinite alternate ease-in-out; }
    @keyframes blobMove1 { to{transform:translate(60px,80px)} }
    @keyframes blobMove2 { to{transform:translate(-60px,-80px)} }
    .outer-card { position:relative; padding:6px; border-radius:22px; background:linear-gradient(135deg,#ff2d78,#00e5ff,#ff2d78); background-size:300% 300%; animation:borderSpin 4s linear infinite; box-shadow:0 0 40px rgba(255,45,120,.3); }
    @keyframes borderSpin { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }
    .card { background:#252535; border-radius:17px; width:340px; padding:36px 32px 30px; position:relative; overflow:hidden; animation:cardAppear .6s cubic-bezier(.34,1.56,.64,1) both; }
    @keyframes cardAppear { from{opacity:0;transform:scale(.8) translateY(20px)} to{opacity:1;transform:scale(1) translateY(0)} }
    .title { text-align:center; font-family:'Orbitron',sans-serif; font-size:1.2rem; font-weight:800; color:#fff; letter-spacing:3px; margin-bottom:24px; display:flex; align-items:center; justify-content:center; gap:10px; }
    .title .icon { color:#00e5ff; animation:pulse 1.5s infinite; }
    @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.25)} }
    .field { margin-bottom:14px; position:relative; }
    .field input { width:100%; padding:13px 44px 13px 42px; border-radius:50px; border:none; background:rgba(255,255,255,.92); color:#1e1e2e; font-family:'Poppins',sans-serif; font-size:.88rem; outline:none; transition:box-shadow .25s; }
    .field input::placeholder { color:#888; }
    .field input:focus { box-shadow:0 0 0 3px rgba(0,229,255,.4); }
    .field .ico { position:absolute; left:16px; top:50%; transform:translateY(-50%); font-size:.95rem; pointer-events:none; }
    .eye-btn { position:absolute; right:16px; top:50%; transform:translateY(-50%); background:none; border:none; cursor:pointer; font-size:1rem; color:#888; padding:0; }
    .btn-signup { width:100%; padding:13px; margin-top:6px; border:none; border-radius:50px; background:linear-gradient(90deg,#ff2d78,#ff6fa3); color:#fff; font-family:'Poppins',sans-serif; font-size:.92rem; font-weight:700; cursor:pointer; transition:transform .2s,box-shadow .2s; box-shadow:0 6px 22px rgba(255,45,120,.4); }
    .btn-signup:hover { transform:translateY(-2px); box-shadow:0 10px 30px rgba(255,45,120,.6); }
    .footer-links { display:flex; justify-content:center; margin-top:18px; font-size:.78rem; }
    .footer-links a { color:#00e5ff; font-weight:600; text-decoration:none; cursor:pointer; }
    .corner { position:absolute; width:18px; height:18px; pointer-events:none; }
    .corner-tl { top:10px; left:10px; border-top:2px solid #00e5ff; border-left:2px solid #00e5ff; border-radius:3px 0 0 0; }
    .corner-tr { top:10px; right:10px; border-top:2px solid #ff2d78; border-right:2px solid #ff2d78; border-radius:0 3px 0 0; }
    .corner-bl { bottom:10px; left:10px; border-bottom:2px solid #ff2d78; border-left:2px solid #ff2d78; border-radius:0 0 0 3px; }
    .corner-br { bottom:10px; right:10px; border-bottom:2px solid #00e5ff; border-right:2px solid #00e5ff; border-radius:0 0 3px 0; }
    #toast { position:fixed; bottom:30px; left:50%; transform:translateX(-50%) translateY(80px); background:rgba(20,20,30,.95); border:1px solid rgba(255,255,255,.13); color:#fff; padding:11px 26px; border-radius:50px; font-size:.82rem; font-weight:600; transition:transform .4s cubic-bezier(.34,1.56,.64,1); z-index:9999; white-space:nowrap; }
    #toast.show { transform:translateX(-50%) translateY(0); }
  </style>
</head>
<body>
  <div class="outer-card">
    <div class="card">
      <div class="corner corner-tl"></div>
      <div class="corner corner-tr"></div>
      <div class="corner corner-bl"></div>
      <div class="corner corner-br"></div>
      <div class="title">✦ SIGN UP <span class="icon">★</span></div>

      <div class="field">
        <span class="ico">👤</span>
        <input type="text" id="new-username" placeholder="Choose username" autocomplete="off"/>
      </div>
      <div class="field">
        <span class="ico">📧</span>
        <input type="text" id="new-email" placeholder="Email (optional)" autocomplete="off"/>
      </div>
      <div class="field">
        <span class="ico">🔒</span>
        <input type="password" id="new-password" placeholder="Choose password"/>
        <button class="eye-btn" onclick="togglePass('new-password',this)">👁️</button>
      </div>
      <div class="field">
        <span class="ico">🔑</span>
        <input type="password" id="confirm-password" placeholder="Confirm password"/>
        <button class="eye-btn" onclick="togglePass('confirm-password',this)">👁️</button>
      </div>

      <button class="btn-signup" id="signup-btn">✅ Create Account</button>

      <div class="footer-links">
        <a onclick="window.location.href='login.html'">← Already have account? Login</a>
      </div>
    </div>
  </div>
  <div id="toast"></div>

  <script>
    function togglePass(id, btn) {
      var inp = document.getElementById(id);
      if (inp.type === 'password') {
        inp.type = 'text';
        btn.textContent = '🙈';
      } else {
        inp.type = 'password';
        btn.textContent = '👁️';
      }
    }

    document.getElementById('signup-btn').onclick = function() {
      var username = document.getElementById('new-username').value.trim();
      var password = document.getElementById('new-password').value.trim();
      var confirm  = document.getElementById('confirm-password').value.trim();

      if (!username || !password || !confirm) { showToast('⚠️ Please fill all fields!'); return; }
      if (password !== confirm) { showToast('❌ Passwords do not match!'); return; }
      if (password.length < 4) { showToast('⚠️ Password must be 4+ characters!'); return; }

      var users = JSON.parse(localStorage.getItem('dk-users') || '[]');
      for (var i = 0; i < users.length; i++) {
        if (users[i].username === username) { showToast('❌ Username already taken!'); return; }
      }

      users.push({ username: username, password: password });
      localStorage.setItem('dk-users', JSON.stringify(users));
      showToast('✅ Account created! Going to login...');
      setTimeout(function() { window.location.href = 'login.html'; }, 1500);
    };

    document.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') document.getElementById('signup-btn').click();
    });

    function showToast(msg) {
      var t = document.getElementById('toast');
      t.textContent = msg; t.classList.add('show');
      setTimeout(function() { t.classList.remove('show'); }, 2800);
    }
  </script>
</body>
</html>
