<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🚀 Shop Dashboard - Loading...</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@800&family=Poppins:wght@600&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1e1e2e, #252535);
      font-family: 'Poppins', sans-serif;
      overflow: hidden;
    }
    
    .loader-container {
      text-align: center;
      color: #fff;
    }
    
    .loader {
      width: 60px;
      height: 60px;
      border: 4px solid rgba(255,255,255,.1);
      border-top: 4px solid #ff2d78;
      border-right: 4px solid #00e5ff;
      border-radius: 50%;
      animation: spin 1.2s linear infinite;
      margin: 0 auto 30px;
    }
    
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    
    h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.8rem;
      letter-spacing: 2px;
      margin-bottom: 10px;
      background: linear-gradient(90deg, #ff2d78, #00e5ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    p {
      font-size: 1rem;
      color: rgba(255,255,255,.7);
      margin-bottom: 5px;
    }
    
    .small-text {
      font-size: 0.85rem;
      color: rgba(255,255,255,.5);
      margin-top: 20px;
    }
    
    .pulse {
      display: inline-block;
      animation: pulse-anim 1.5s ease-in-out infinite;
    }
    
    @keyframes pulse-anim {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
  </style>
</head>
<body>
  <div class="loader-container">
    <div class="loader"></div>
    <h1>🚀 SHOP PANEL</h1>
    <p>Initializing your dashboard...</p>
    <p class="small-text">Redirecting to login <span class="pulse">●</span></p>
  </div>

  <script>
    // Auto-redirect to login after 2 seconds
    setTimeout(function() {
      window.location.href = 'login.html';
    }, 2000);
    
    // Allow users to click to go directly to login
    document.body.addEventListener('click', function() {
      window.location.href = 'login.html';
    });
  </script>
</body>
</html>
