<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login Page</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&family=Poppins:wght@400;600&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: #1e1e2e; font-family: 'Poppins', sans-serif; overflow: hidden;
    }
    body::before, body::after {
      content: ''; position: fixed; border-radius: 50%; filter: blur(80px); opacity: .18; pointer-events: none;
    }
    body::before { width:400px; height:400px; background:#ff2d78; top:-100px; left:-100px; animation:blobMove1 8s infinite alternate ease-in-out; }
    body::after  { width:350px; height:350px; background:#00e5ff; bottom:-80px; right:-80px; animation:blobMove2 7s infinite alternate ease-in-out; }
    @keyframes blobMove1 { to{transform:translate(60px,80px)} }
    @keyframes blobMove2 { to{transform:translate(-60px,-80px)} }

    .outer-card { position:relative; padding:6px; border-radius:22px; background:linear-gradient(135deg,#ff2d78,#00e5ff,#ff2d78); background-size:300% 300%; animation:borderSpin 4s linear infinite; box-shadow:0 0 40px rgba(255,45,120,.3); }
    @keyframes borderSpin { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }

    .card { background:#252535; border-radius:17px; width:340px; padding:36px 32px 30px; position:relative; overflow:hidden; animation:cardAppear .6s cubic-bezier(.34,1.56,.64,1) both; }
    @keyframes cardAppear { from{opacity:0;transform:scale(.8) translateY(20px)} to{opacity:1;transform:scale(1) translateY(0)} }
    .card::before { content:''; position:absolute; inset:8px; border-radius:12px; border:1px solid rgba(255,255,255,.07); pointer-events:none; }

    .title { text-align:center; font-family:'Orbitron',sans-serif; font-size:1.3rem; font-weight:800; color:#fff; letter-spacing:3px; margin-bottom:28px; display:flex; align-items:center; justify-content:center; gap:10px; }
    .title .icon { color:#ff2d78; font-size:1.2rem; animation:pulse 1.5s infinite; }
    @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.25)} }

    .role-badge { text-align:center; font-size:.68rem; font-weight:700; text-transform:uppercase; letter-spacing:2px; margin-bottom:20px; padding:5px 18px; border-radius:50px; display:inline-block; width:100%; }
    .role-user  { background:rgba(0,229,255,.12); color:#00e5ff; border:1px solid rgba(0,229,255,.3); }

    .field { margin-bottom:14px; position:relative; }
    .field input { width:100%; padding:13px 18px 13px 42px; border-radius:50px; border:none; background:rgba(255,255,255,.92); color:#1e1e2e; font-family:'Poppins',sans-serif; font-size:.88rem; outline:none; transition:box-shadow .25s; }
    .field input::placeholder { color:#888; }
    .field input:focus { box-shadow:0 0 0 3px rgba(0,229,255,.4); }
    .field .ico { position:absolute; left:16px; top:50%; transform:translateY(-50%); font-size:.95rem; pointer-events:none; }

    .btn-signin { width:100%; padding:13px; margin-top:6px; border:none; border-radius:50px; background:linear-gradient(90deg,#00e5ff,#00b8d4); color:#1e1e2e; font-family:'Poppins',sans-serif; font-size:.92rem; font-weight:700; cursor:pointer; transition:transform .2s,box-shadow .2s; box-shadow:0 6px 22px rgba(0,229,255,.4); }
    .btn-signin:hover { transform:translateY(-2px); box-shadow:0 10px 30px rgba(0,229,255,.6); }

    .footer-links { display:flex; justify-content:space-between; margin-top:18px; font-size:.78rem; }
    .footer-links a { color:rgba(255,255,255,.4); text-decoration:none; cursor:pointer; }
    .footer-links .signup { color:#ff2d78; font-weight:600; }

    .corner { position:absolute; width:18px; height:18px; pointer-events:none; }
    .corner-tl { top:10px; left:10px; border-top:2px solid #00e5ff; border-left:2px solid #00e5ff; border-radius:3px 0 0 0; }
    .corner-tr { top:10px; right:10px; border-top:2px solid #ff2d78; border-right:2px solid #ff2d78; border-radius:0 3px 0 0; }
    .corner-bl { bottom:10px; left:10px; border-bottom:2px solid #ff2d78; border-left:2px solid #ff2d78; border-radius:0 0 0 3px; }
    .corner-br { bottom:10px; right:10px; border-bottom:2px solid #00e5ff; border-right:2px solid #00e5ff; border-radius:0 0 3px 0; }

    #toast { position:fixed; bottom:30px; left:50%; transform:translateX(-50%) translateY(80px); background:rgba(20,20,30,.95); border:1px solid rgba(255,255,255,.13); color:#fff; padding:11px 26px; border-radius:50px; font-size:.82rem; font-weight:600; transition:transform .4s cubic-bezier(.34,1.56,.64,1); z-index:9999; white-space:nowrap; }
    #toast.show { transform:translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<div class="outer-card">
  <div class="card" id="login-card">
    <div class="corner corner-tl"></div>
    <div class="corner corner-tr"></div>
    <div class="corner corner-bl"></div>
    <div class="corner corner-br"></div>

    <div class="title"><span>➤</span> LOGIN <span class="icon">♥</span></div>
    <div class="role-badge role-user" id="role-badge">🏪 Shop Owner Login</div>

    <div class="field">
      <span class="ico">👤</span>
      <input type="text" id="username" placeholder="Username" autocomplete="off"/>
    </div>
    <div class="field">
      <span class="ico">🔒</span>
      <input type="password" id="password" placeholder="Password"/>
    </div>

    <button class="btn-signin" id="signin-btn">sign in</button>

    <div class="footer-links">
      <a onclick="window.location.href='#'">forget password</a>
      <a class="signup" onclick="window.location.href='signup.html'">sign up</a>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
  // Default credentials - SHOP OWNER ONLY
  var creds = {
    user:  { username: 'user123',  password: 'pass123' }
  };

  // Sign In button click
  document.getElementById('signin-btn').onclick = function() {
    var u = document.getElementById('username').value.trim();
    var p = document.getElementById('password').value.trim();

    if (!u || !p) {
      showToast('⚠️ Username aur password daalo!');
      return;
    }

    // Check signup users
    var users = JSON.parse(localStorage.getItem('dk-users') || '[]');
    var found = false;
    for (var i = 0; i < users.length; i++) {
      if (users[i].username === u && users[i].password === p) {
        found = true;
        break;
      }
    }

    if (found) {
      showToast('✅ Welcome ' + u + '!');
      goToDashboard();
      return;
    }

    // Check default user
    var valid = creds.user;
    if (u === valid.username && p === valid.password) {
      showToast('✅ Welcome ' + u + '!');
      goToDashboard();
    } else {
      showToast('❌ Wrong username or password!');
    }
  };

  function goToDashboard() {
    showToast('✅ Login successful! Opening dashboard...');
    var t = setTimeout(function() {
      window.location.replace('dashboard.html');
    }, 1200);
  }

  document.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') document.getElementById('signin-btn').click();
  });

  function showToast(msg) {
    var t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(function() { t.classList.remove('show'); }, 2500);
  }
</script>
</body>
</html>
